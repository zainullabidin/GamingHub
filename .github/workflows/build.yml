name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install SFML
        run: sudo apt-get update && sudo apt-get install -y libsfml-dev

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build